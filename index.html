<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova AI Assistant - Smart AI Chatbot</title>

<meta name="description" content="Nova AI Assistant is a smart AI chatbot powered by Gemini. Ask questions and get instant AI answers.">

<meta name="keywords" content="Nova AI, Nova AI Assistant, AI chatbot, AI assistant">
  
<meta name="google-site-verification" content="KQt8AVz_MKs8ZcPqWMuSBB0-_G7PnSfrYlIMEUUKlGQ" />
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">

</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

        <div class="logo">
            🤖 <span>Nova AI</span>
        </div>

        <button class="new-chat">+ New Chat</button>

        <div class="history">
            <h3>History</h3>
            <ul id="historyList"></ul>
        </div>

    </aside>

    <!-- Main Chat -->
    <main class="chat-area">

        <header class="topbar">

            <button id="menuBtn">☰</button>

            <h2>Nova AI Assistant</h2>

            <div class="status">
                <span class="dot"></span>
                Online
            </div>

        </header>

        <div id="messages" class="messages">

            <div class="message bot">
                👋 Welcome to Nova AI!
            </div>

        </div>

        <footer class="chat-input">

            <button>😊</button>

            <button>📎</button>

            <button>🎤</button>

            <input
                id="prompt"
                placeholder="Ask Nova AI anything..."
            >

            <button id="send">
                ➤
            </button>

        </footer>

    </main>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
